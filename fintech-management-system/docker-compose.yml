services:
  db:
    image: postgres:16
    container_name: fintech_db
    environment:
      POSTGRES_USER: fintech
      POSTGRES_PASSWORD: fintech
      POSTGRES_DB: fintech
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintech -d fintech"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: fintech_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://fintech:fintech@db:5432/fintech
      CORS_ALLOW_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      AUTO_CREATE_TABLES: "true"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: fintech_frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: /api/v1
      VITE_DEV_API_TARGET: http://backend:8000
    ports:
      - "5173:5173"

volumes:
  postgres_data:
